apiVersion: v1
kind: Namespace
metadata:
  name: amazon-ssm-agent

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ssm-agent-installer
  namespace: amazon-ssm-agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ssm-agent-installer
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ssm-agent-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ssm-agent-installer
subjects:
  - kind: ServiceAccount
    name: ssm-agent-installer
    namespace: amazon-ssm-agent

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssm-install-script
  namespace: amazon-ssm-agent
data:
  install.sh: |
    #!/bin/bash
    set -ex

    # Download AL2023-compatible SSM Agent
    curl -o /tmp/amazon-ssm-agent.rpm \
      https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm

    # Install directly into host (AL2023 supported)
    nsenter --mount=/host/proc/1/ns/mnt -- rpm -Uvh /tmp/amazon-ssm-agent.rpm || true

    # Enable + start service on host
    nsenter --mount=/host/proc/1/ns/mnt -- systemctl enable amazon-ssm-agent || true
    nsenter --mount=/host/proc/1/ns/mnt -- systemctl start amazon-ssm-agent || true

    echo "SUCCESS"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ssm-agent-installer
  namespace: amazon-ssm-agent
spec:
  selector:
    matchLabels:
      app: ssm-agent-installer
  template:
    metadata:
      labels:
        app: ssm-agent-installer
    spec:
      serviceAccountName: ssm-agent-installer
      hostPID: true
      containers:
        - name: installer
          image: public.ecr.aws/amazonlinux/amazonlinux:2
          securityContext:
            privileged: true
          command: ["/bin/bash", "/scripts/install.sh"]
          volumeMounts:
            - name: host
              mountPath: /host
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: host
          hostPath:
            path: /
        - name: scripts
          configMap:
            name: ssm-install-script
            defaultMode: 0755